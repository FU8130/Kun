name: Build Portable
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Build portable exe
        run: npx --yes electron-builder@26.8.1 --win portable --x64

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kun-Portable
          path: dist/*portable*.exe
          if-no-files-found: error
